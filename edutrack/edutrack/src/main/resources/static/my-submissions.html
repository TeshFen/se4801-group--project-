<!DOCTYPE html>
<html>

<head>
    <title>My Submissions - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <span class="text-xl font-bold text-indigo-600">EduTrack</span>
        <div>
            <span id="userEmail" class="text-sm text-gray-700 mr-4"></span>
            <button onclick="logout()" class="text-sm text-red-500">Logout</button>
        </div>
    </nav>
    <div class="container mx-auto p-8">
        <div class="mb-4">
            <a href="/dashboard.html" class="text-indigo-600 hover:underline">&larr; Back to Dashboard</a>
        </div>
        <h1 class="text-3xl font-bold">My Submissions</h1>
        <div id="submissionList" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const userJson = localStorage.getItem('user');
        if (!token || !userJson) window.location.href = '/login.html';
        const user = JSON.parse(userJson);
        document.getElementById('userEmail').textContent = user.email + ' (' + user.role + ')';
        if (user.role !== 'STUDENT') {
            alert('Only students can view submissions.');
            window.location.href = '/dashboard.html';
        }

        async function loadSubmissions() {
            const container = document.getElementById('submissionList');
            container.innerHTML = `<div class="bg-white p-4 rounded shadow"><p class="text-gray-600">Loading...</p></div>`;
            try {
                const res = await fetch('/api/submissions/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401 || res.status === 403) {
                    alert('Session expired. Please login again.');
                    logout();
                    return;
                }
                if (!res.ok) {
                    let errorMsg = 'Failed to load submissions.';
                    try { const data = await res.json(); if (data.message) errorMsg = data.message; } catch (e) { }
                    container.innerHTML = `<div class="bg-red-100 p-4 rounded text-red-700">${errorMsg}</div>`;
                    return;
                }
                const data = await res.json();
                if (data.content && data.content.length > 0) {
                    container.innerHTML = data.content.map(s => `
                        <div class="bg-white p-4 rounded shadow">
                            <p class="text-sm text-gray-500">Assignment ID: ${s.assignmentId}</p>
                            <p class="text-sm text-gray-500">Submitted: ${new Date(s.submittedAt).toLocaleString()}</p>
                            <p class="text-sm text-gray-500">File: ${s.fileUrl || 'N/A'}</p>
                            ${s.grade !== null && s.grade !== undefined ? `<p class="text-sm font-bold text-green-600">Grade: ${s.grade}</p>` : '<p class="text-sm text-yellow-600">Not graded yet</p>'}
                            ${s.feedback ? `<p class="text-sm text-gray-600">Feedback: ${s.feedback}</p>` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<div class="bg-white p-4 rounded shadow"><p class="text-gray-600">You have not submitted any assignments yet.</p></div>`;
                }
            } catch (err) {
                container.innerHTML = `<div class="bg-red-100 p-4 rounded text-red-700">Network error: ${err.message}</div>`;
            }
        }
        loadSubmissions();

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>

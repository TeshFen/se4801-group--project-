<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Register - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow">
        <h2 class="text-2xl font-bold text-center mb-6">Register</h2>
        <form id="registerForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Full Name</label>
                <input type="text" id="fullName" class="w-full p-3 border rounded-lg" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Role</label>
                <select id="role" class="w-full p-3 border rounded-lg">
                    <option value="STUDENT">Student</option>
                    <option value="INSTRUCTOR">Instructor</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700">Register</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-600">
            Already have an account? <a href="/login.html" class="text-indigo-600 hover:underline">Login</a>
        </p>
        <div id="message" class="mt-4 text-red-500 text-sm text-center hidden"></div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const msg = document.getElementById('message');
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, role })
                });
                if (res.ok) {
                    window.location.href = '/login.html?registered';
                } else {
                    const data = await res.json();
                    msg.textContent = data.message || 'Registration failed';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.textContent = 'Network error';
                msg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Create Assignment - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <span class="text-xl font-bold text-indigo-600">EduTrack</span>
        <div>
            <span id="userEmail" class="text-sm text-gray-700 mr-4"></span>
            <button onclick="logout()" class="text-sm text-red-500">Logout</button>
        </div>
    </nav>
    <div class="container mx-auto p-8 max-w-2xl">
        <div class="mb-4">
            <a href="/assignments.html" class="text-indigo-600 hover:underline">&larr; Back to Assignments</a>
        </div>
        <h1 class="text-3xl font-bold mb-6">Create New Assignment</h1>
        <form id="createAssignmentForm" class="bg-white p-6 rounded shadow">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Course</label>
                <select id="courseId" class="w-full p-3 border rounded" required>
                    <option value="">Loading courses...</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Title</label>
                <input type="text" id="title" class="w-full p-3 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Description</label>
                <textarea id="description" class="w-full p-3 border rounded" rows="3"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Deadline</label>
                <input type="datetime-local" id="deadline" class="w-full p-3 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Max Score</label>
                <input type="number" id="maxScore" class="w-full p-3 border rounded" min="1" max="100" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded hover:bg-indigo-700">Create
                Assignment</button>
        </form>
        <div id="message" class="mt-4 hidden"></div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('userEmail').textContent = user.email + ' (' + user.role + ')';
        if (user.role !== 'INSTRUCTOR' && user.role !== 'ADMIN') {
            alert('Only instructors can create assignments.');
            window.location.href = '/dashboard.html';
        }

        async function loadCourses() {
            try {
                const res = await fetch('/api/courses', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401 || res.status === 403) {
                    alert('Session expired. Please login again.');
                    logout();
                    return;
                }
                if (res.ok) {
                    const data = await res.json();
                    const select = document.getElementById('courseId');
                    select.innerHTML = '<option value="">Select a course</option>';
                    if (data.content && data.content.length > 0) {
                        data.content.forEach(c => {
                            const opt = document.createElement('option');
                            opt.value = c.id;
                            opt.textContent = c.title;
                            select.appendChild(opt);
                        });
                    } else {
                        select.innerHTML = '<option value="">No courses available</option>';
                    }
                }
            } catch (err) {
                document.getElementById('courseId').innerHTML = '<option value="">Error loading courses</option>';
            }
        }
        loadCourses();

        document.getElementById('createAssignmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const courseId = document.getElementById('courseId').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const deadline = document.getElementById('deadline').value;
            const maxScore = parseInt(document.getElementById('maxScore').value);
            const msg = document.getElementById('message');

            if (!courseId) {
                msg.className = 'mt-4 p-3 bg-red-100 text-red-700 rounded';
                msg.textContent = 'Please select a course.';
                msg.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`/api/courses/${courseId}/assignments`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, description, deadline, maxScore })
                });
                if (res.status === 401 || res.status === 403) {
                    alert('Session expired. Please login again.');
                    logout();
                    return;
                }
                if (res.ok) {
                    msg.className = 'mt-4 p-3 bg-green-100 text-green-700 rounded';
                    msg.textContent = 'Assignment created successfully!';
                    msg.classList.remove('hidden');
                    setTimeout(() => { window.location.href = '/assignments.html'; }, 1500);
                } else {
                    const data = await res.json();
                    msg.className = 'mt-4 p-3 bg-red-100 text-red-700 rounded';
                    msg.textContent = data.message || 'Failed to create assignment.';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.className = 'mt-4 p-3 bg-red-100 text-red-700 rounded';
                msg.textContent = 'Network error.';
                msg.classList.remove('hidden');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow">
        <h2 class="text-2xl font-bold text-center mb-6">Login</h2>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg" required>
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700">Login</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-600">
            Don't have an account? <a href="/register.html" class="text-indigo-600 hover:underline">Register</a>
        </p>
        <div id="message" class="mt-4 text-red-500 text-sm text-center hidden"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({ email: data.email, role: data.role }));
                    window.location.href = '/dashboard.html';
                } else {
                    msg.textContent = data.message || 'Login failed';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.textContent = 'Network error';
                msg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>

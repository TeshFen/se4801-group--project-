<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Admin - Users')"></head>

<body class="bg-gray-50">
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">User Management</h1>
        <div class="bg-white rounded-xl shadow overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Full Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users.content}" class="border-b">
                        <td class="px-6 py-4 text-sm" th:text="${user.id}"></td>
                        <td class="px-6 py-4 text-sm" th:text="${user.email}"></td>
                        <td class="px-6 py-4 text-sm" th:text="${user.fullName}"></td>
                        <td class="px-6 py-4 text-sm" th:text="${user.role}"></td>
                        <td class="px-6 py-4 text-sm">
                            <span th:if="${user.isActive}" class="text-green-600">Active</span>
                            <span th:unless="${user.isActive}" class="text-red-600">Disabled</span>
                        </td>
                        <td class="px-6 py-4 text-sm">
                            <form th:action="'/admin/users/' + ${user.id} + '/disable'" method="post" class="inline">
                                <input type="hidden" name="enable" th:value="${!user.isActive}">
                                <button type="submit" class="text-sm text-indigo-600 hover:underline">
                                    <span th:if="${user.isActive}">Disable</span>
                                    <span th:unless="${user.isActive}">Enable</span>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div class="mt-6 flex justify-center gap-2" th:if="${totalPages > 1}">
            <a th:each="i : ${#numbers.sequence(0, totalPages-1)}" th:href="'/admin/users?page=' + ${i}"
                th:class="'px-4 py-2 rounded ' + (i == currentPage ? 'bg-indigo-600 text-white' : 'bg-gray-200')"
                th:text="${i+1}"></a>
        </div>
    </div>
</body>

</html>

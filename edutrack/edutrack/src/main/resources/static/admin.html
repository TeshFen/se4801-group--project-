<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <span class="text-xl font-bold text-indigo-600">EduTrack</span>
        <div>
            <span id="userEmail" class="text-sm text-gray-700 mr-4"></span>
            <button onclick="logout()" class="text-sm text-red-500">Logout</button>
        </div>
    </nav>
    <div class="container mx-auto p-8">
        <div class="mb-4">
            <a href="/dashboard.html" class="text-indigo-600 hover:underline">&larr; Back to Dashboard</a>
        </div>
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold">Admin Panel - User Management</h1>
            <button onclick="loadUsers()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">↻
                Refresh</button>
        </div>
        <div id="errorMessage" class="mt-4 hidden p-3 rounded text-center"></div>
        <div id="userList" class="mt-4 bg-white rounded shadow overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Full Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr>
                        <td colspan="6" class="text-center p-4">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        // --- Auth check ---
        const token = localStorage.getItem('token');
        if (!token) {
            alert('Please login first.');
            window.location.href = '/login.html';
        }
        const userJson = localStorage.getItem('user');
        if (!userJson) {
            alert('User data missing. Please login again.');
            window.location.href = '/login.html';
        }
        const user = JSON.parse(userJson);
        if (user.role !== 'ADMIN') {
            alert('Admin access required.');
            window.location.href = '/dashboard.html';
        }
        document.getElementById('userEmail').textContent = user.email + ' (' + user.role + ')';

        // --- Show error message without logging out ---
        function showError(message, isWarning = false) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.className = 'mt-4 p-3 rounded text-center ' + (isWarning ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800');
            errorDiv.classList.remove('hidden');
        }

        // --- Load users ---
        async function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.add('hidden');
            tbody.innerHTML = `<tr><td colspan="6" class="text-center p-4">Loading...</td></tr>`;

            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401 || res.status === 403) {
                    // Token expired or invalid – show message but stay on page
                    const data = await res.json().catch(() => ({}));
                    const msg = data.message || 'Your session has expired. Please log in again to continue.';
                    showError(msg + ' <button onclick="logout()" class="underline font-bold">Login again</button>', true);
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center p-4 text-yellow-600">Session expired – please re‑login.</td></tr>`;
                    return;
                }
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showError(data.message || 'Failed to load users.');
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center p-4 text-red-500">Failed to load users.</td></tr>`;
                    return;
                }
                const data = await res.json();
                if (data.content && data.content.length > 0) {
                    tbody.innerHTML = data.content.map(u => `
                        <tr class="border-b">
                            <td class="px-6 py-4 text-sm">${u.id}</td>
                            <td class="px-6 py-4 text-sm">${u.email}</td>
                            <td class="px-6 py-4 text-sm">${u.fullName}</td>
                            <td class="px-6 py-4 text-sm">${u.role}</td>
                            <td class="px-6 py-4 text-sm">${u.isActive ? 'Active' : 'Disabled'}</td>
                            <td class="px-6 py-4 text-sm">
                                <button onclick="toggleUser(${u.id}, ${!u.isActive})" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm hover:bg-indigo-700">
                                    ${u.isActive ? 'Disable' : 'Enable'}
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center p-4">No users found.</td></tr>`;
                }
            } catch (err) {
                showError('Network error: ' + err.message);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center p-4 text-red-500">Network error.</td></tr>`;
            }
        }

        // --- Toggle user status ---
        async function toggleUser(userId, enable) {
            if (!confirm(`Are you sure you want to ${enable ? 'enable' : 'disable'} this user?`)) return;
            try {
                const res = await fetch(`/api/admin/users/${userId}/disable?enable=${enable}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401 || res.status === 403) {
                    showError('Your session has expired. Please log in again.', true);
                    return;
                }
                if (res.ok) {
                    alert(enable ? 'User enabled.' : 'User disabled.');
                    loadUsers(); // refresh list
                } else {
                    const data = await res.json().catch(() => ({}));
                    alert('Action failed: ' + (data.message || 'Unknown error'));
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        }

        // --- Logout ---
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        // --- Initial load ---
        loadUsers();
    </script>
</body>

</html>

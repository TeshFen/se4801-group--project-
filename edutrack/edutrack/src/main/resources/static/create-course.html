<!DOCTYPE html>
<html>

<head>
    <title>Create Course - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <span class="text-xl font-bold text-indigo-600">EduTrack</span>
        <div>
            <span id="userEmail" class="text-sm text-gray-700 mr-4"></span>
            <button onclick="logout()" class="text-sm text-red-500">Logout</button>
        </div>
    </nav>
    <div class="container mx-auto p-8 max-w-2xl">
        <div class="mb-4">
            <a href="/courses.html" class="text-indigo-600 hover:underline">&larr; Back to Courses</a>
        </div>
        <h1 class="text-3xl font-bold mb-6">Create New Course</h1>
        <form id="createCourseForm" class="bg-white p-6 rounded shadow">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Title</label>
                <input type="text" id="title" class="w-full p-3 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Description</label>
                <textarea id="description" class="w-full p-3 border rounded" rows="3"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Start Date</label>
                <input type="date" id="startDate" class="w-full p-3 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">End Date</label>
                <input type="date" id="endDate" class="w-full p-3 border rounded" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded hover:bg-indigo-700">Create
                Course</button>
        </form>
        <div id="message" class="mt-4 hidden"></div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('userEmail').textContent = user.email + ' (' + user.role + ')';
        if (user.role !== 'INSTRUCTOR' && user.role !== 'ADMIN') {
            alert('Only instructors can create courses.');
            window.location.href = '/dashboard.html';
        }

        document.getElementById('createCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const msg = document.getElementById('message');

            try {
                const res = await fetch('/api/courses', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, description, startDate, endDate })
                });
                if (res.status === 401 || res.status === 403) {
                    alert('Session expired. Please login again.');
                    logout();
                    return;
                }
                if (res.ok) {
                    msg.className = 'mt-4 p-3 bg-green-100 text-green-700 rounded';
                    msg.textContent = 'Course created successfully!';
                    msg.classList.remove('hidden');
                    setTimeout(() => { window.location.href = '/courses.html'; }, 1500);
                } else {
                    const data = await res.json();
                    msg.className = 'mt-4 p-3 bg-red-100 text-red-700 rounded';
                    msg.textContent = data.message || 'Failed to create course.';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.className = 'mt-4 p-3 bg-red-100 text-red-700 rounded';
                msg.textContent = 'Network error.';
                msg.classList.remove('hidden');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>

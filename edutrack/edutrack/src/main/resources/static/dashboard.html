<!DOCTYPE html>
<html>

<head>
    <title>Dashboard - EduTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <span class="text-xl font-bold text-indigo-600">EduTrack</span>
        <div>
            <span id="userEmail" class="text-sm text-gray-700 mr-4"></span>
            <button onclick="logout()" class="text-sm text-red-500">Logout</button>
        </div>
    </nav>
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold">Dashboard</h1>
        <p class="mt-2 text-gray-600">Welcome, <span id="userName"></span>!</p>
        <div class="mt-6 space-x-4">
            <a href="/courses.html" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">View
                Courses</a>
            <a id="mySubmissionsLink" href="/my-submissions.html"
                class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 hidden">My Submissions</a>
            <a id="viewAssignmentsLink" href="/assignments.html"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 hidden">View Assignments</a>
            <a id="createAssignmentLink" href="/create-assignment.html"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 hidden">Create Assignment</a>
            <a id="createCourseLink" href="/create-course.html"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 hidden">Create Course</a>
            <a id="adminLink" href="/admin.html"
                class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 hidden">Admin Panel</a>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = '/login.html';
        document.getElementById('userEmail').textContent = user.email + ' (' + user.role + ')';
        document.getElementById('userName').textContent = user.email;

        const role = user.role;
        if (role === 'STUDENT') {
            document.getElementById('mySubmissionsLink').classList.remove('hidden');
        } else if (role === 'INSTRUCTOR') {
            document.getElementById('viewAssignmentsLink').classList.remove('hidden');
            document.getElementById('createAssignmentLink').classList.remove('hidden');
            document.getElementById('createCourseLink').classList.remove('hidden');
        } else if (role === 'ADMIN') {
            document.getElementById('viewAssignmentsLink').classList.remove('hidden');
            document.getElementById('createAssignmentLink').classList.remove('hidden');
            document.getElementById('createCourseLink').classList.remove('hidden');
            document.getElementById('adminLink').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>
